# ** // FLOATING WINDOWS \\ **

# ** // CLASSES \\ **

windowrule = match:class nwg-look, float true
windowrule = match:class flameshot, float true
windowrule = match:class kvantum,match:title kvantum Manager, float true
windowrule = match:class jamesdsp, float true

# ** // TITLES \\ **

windowrule = match:title Easy Effects, float true 
windowrule = match:title Pick game to add, float true
windowrule = match:title Upload to MEGA, float true
windowrule = match:title MEGAsync, float true
windowrule = match:title Picture-in-Picture, float true
windowrule = match:title Bluetooth Devices, float true
windowrule = match:title File Operation Progress, float true
windowrule = match:title Volume Control, float true
windowrule = match:title File Roller, float true
windowrule = match:title Extract, float true
windowrule = match:title System Monitor, float true
windowrule = match:title zenity, float true
windowrule = match:title vesktop, float true
windowrule = match:title Select Executable, float true
windowrule = match:title Mission Center, float true
windowrule = match:title Select Audio files, float true
windowrule = match:title Select Folder, float true
windowrule = match:title Authentication required, float true



# ** // WINDOW SIZING \\ **

windowrule = match:title ^Mission Center$, size (monitor_w*0.55) (monitor_h*0.55)
windowrule = match:title ^Picture-in-Picture$, size (monitor_w*0.25) (monitor_h*0.25)
windowrule = match:title ^Easy Effects$, size (monitor_w*0.45) (monitor_h*0.45)
windowrule = match:class ^jamesdsp$, size (monitor_w*0.5) (monitor_h*0.5)
windowrule = match:title ^File Operation Progress$, size (monitor_w*0.50) (monitor_h*0.50)
windowrule = match:title ^Bluetooth Devices$, size (monitor_w*0.30) (monitor_h*0.30)
windowrule = match:title ^Volume Control$, size (monitor_w*0.5) (monitor_h*0.5)
windowrule = match:title ^File Roller$, size (monitor_w*0.50) (monitor_h*0.30)
windowrule = match:title ^Extract$, size (monitor_w*0.50) (monitor_h*0.30)
windowrule = match:class ^nwg-look$, size (monitor_w*0.27) (monitor_h*0.30)
windowrule = match:title ^Enter name of file to save to$, size (monitor_w*0.26) (monitor_h*0.30)
windowrule = match:title ^Select Executable$, size (monitor_w*0.50) (monitor_h*0.50)
windowrule = match:title ^File Upload$, size (monitor_w*0.50) (monitor_h*0.50)
windowrule = match:title ^Save Image$, size (monitor_w*0.50) (monitor_h*0.50)
windowrule = match:title ^Add Non-Steam Game$, size (monitor_w*0.50) (monitor_h*0.50)
windowrule = match:title ^Pick game to add$, size (monitor_w*0.50) (monitor_h*0.50)
windowrule = match:title ^Steam Big Picture Mode$, size (monitor_w*1.0) (monitor_h*1.0)
windowrule = match:title ^Heroic Games Launcher$, size (monitor_w*1.0) (monitor_h*1.0)

# WINDOWS POSITIONING #

windowrule = match:title ^Picture-in-Picture, move window_w*(0.3) 10
windowrule = match:title MEGAsync. move 83 5
windowrule = match:class ^flameshot, move 0 0
windowrule = match:class nwg-look, center true
windowrule = match:class jamesdsp, center true

# WINDOWS OPACITY #

windowrule = opacity 0.0 override, match:class xwaylandvideobridge
windowrule = opacity 1 override, match:title Picture-in-Picture
windowrule = opacity 1, match:class steam_app_0


