# ** // THEMING VARIABLES \\ **
# https://wiki.hypr.land/Configuring/Variables/

# ** // CURSOR THEMING \\ **

env =  HYPRCURSOR_THEME,Catppuccin Frappé Red
env =  HYPRCURSOR_SIZE,24

# ** // LAYOUT \\ **

general {
    gaps_in = 4
    gaps_out = 10
    border_size = 2
    col.active_border = $color12 $color13
    col.inactive_border = $background
    resize_on_border = false
    layout = dwindle
}


# ** // DECORATIONS \\ **

decoration {
    rounding = 12
    rounding_power = 6
    active_opacity = 0.85
    inactive_opacity = 0.85
    
# ** // BLUR \\ **

blur {
    size = 6
    passes = 4
    noise = 0.03
    brightness = 0.8
    contrast = 0.9
    vibrancy = 0.2
    popups = true
    ignore_opacity = true
    new_optimizations = true
    xray = true
}

# ** // SHADOW \\ **

shadow {
    range = 12
    render_power = 4
    ignore_window = yes
    color = $color12
    color_inactive = $background
}
}

animations {
    enabled = true
    bezier = springy, 0.175, 0.885, 0.32, 1.275
    bezier = fluid, 0.4, 0.0, 0.2, 1
    bezier = overshoot, 0.3, 1.4, 0.5, 1
    bezier = easeoutquint, 0.22, 1, 0.36, 1
    animation = workspaces, 1, 8, easeoutquint, slidefade 12%
    animation = windowsIn, 1, 5, springy, popin
    animation = windowsOut, 1, 6, overshoot, slide
    animation = windowsMove, 1, 6, springy, slidefade
    animation = layersIn, 1, 4, springy, popin
    animation = layersOut, 1, 4, overshoot, popin
    animation = border, 1, 6, fluid
    animation = borderangle, 1, 40, fluid, loop
}

# ** // DWINDLE | MASTER LAYOUT \\ **

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = true
}

master {
    new_status = master
    allow_small_split = true
    orientation = right
    mfact = 0.5
}