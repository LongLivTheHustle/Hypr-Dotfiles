# ** // RENDER \\ **

render:non_shader_cm = 1
render:direct_scanout = 2
render:new_render_scheduling = true

# ** // XWAYLAND \\ **


xwayland:create_abstract_socket = true
xwayland:force_zero_scaling = true

input:repeat_rate = 25
input:repeat_delay = 150
input:accel_profile  = flat
input:force_no_accel = true

general:snap:enabled = true
general:allow_tearing = true
general:locale = en_US 

debug:disable_logs = true

misc:font_family = Jetbrains Mono
misc:splash_font_family = Jetbrains Mono
misc:vrr = 3
misc:on_focus_under_fullscreen = 0

binds:scroll_event_delay = 25
binds:workspace_center_on = 1

quirks:prefer_hdr = 2